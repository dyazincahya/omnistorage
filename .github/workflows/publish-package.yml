name: Publish package to GitHub Packages

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://npm.pkg.github.com"
          scope: "@dyazincahya"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Validate release tag
        if: github.event_name == 'release'
        run: |
          node -e "const fs = require('fs'); const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8')); const tag = process.env.RELEASE_TAG; if (tag !== pkg.version) { console.error('Release tag must match package.json version exactly. Expected ' + pkg.version + ', got ' + tag + '. Use ' + pkg.version + ', not v' + pkg.version + '.'); process.exit(1); }"
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}

      - name: Run tests
        run: npm test

      - name: Publish package
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
